<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Click Derecho | Accedé al Video Gratis</title>
  <meta name="description" content="Duplicá tus clientes en 90 días. Sin publicidad paga."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0e0c;
      --paper: #f5f2ec;
      --gold: #b8972a;
      --gold-lt: #d4b44a;
      --muted: #6b6455;
      --line: rgba(184,151,42,0.25);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--paper);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 5%;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(184,151,42,.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,151,42,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      letter-spacing: .04em; color: var(--paper);
      text-decoration: none; display: block;
      text-align: center; margin-bottom: 2.5rem;
    }
    .logo span { color: var(--gold); }
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(184,151,42,.2);
      border-radius: 6px;
      padding: 3rem 2.5rem;
      max-width: 460px; width: 100%;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 6px 6px 0 0;
    }
    .eyebrow {
      display: inline-block;
      font-size: .65rem; font-weight: 500; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold);
      border: 1px solid rgba(184,151,42,.3); border-radius: 2px;
      padding: .3rem .8rem; margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      line-height: 1.08; font-weight: 700;
      margin-bottom: .75rem;
    }
    h1 em { font-style: italic; color: var(--gold); }
    .sub {
      font-size: .92rem; color: rgba(245,242,236,.55);
      line-height: 1.65; margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: .72rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(245,242,236,.45); margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%; padding: .95rem 1rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(184,151,42,.22);
      border-radius: 3px; color: var(--paper);
      font-family: 'DM Sans', sans-serif; font-size: 1rem;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input::placeholder { color: rgba(245,242,236,.22); }
    .form-group input:focus { border-color: var(--gold); }
    .btn {
      display: block; width: 100%;
      background: var(--gold); color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase;
      padding: 1.05rem; border-radius: 3px; border: none;
      cursor: pointer; margin-top: 1.5rem;
      transition: background .25s, transform .2s;
    }
    .btn:hover { background: var(--gold-lt); transform: translateY(-2px); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .disclaimer {
      text-align: center; margin-top: 1rem;
      font-size: .72rem; color: rgba(245,242,236,.28);
    }
    .success { display: none; text-align: center; padding: 1rem 0; }
    .success .check { font-size: 2.5rem; margin-bottom: 1rem; }
    .success h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; color: var(--gold-lt); margin-bottom: .5rem;
    }
    .success p { font-size: .9rem; color: rgba(245,242,236,.55); }
  </style>
</head>
<body>
  <div style="width:100%;max-width:460px;">
    <a class="logo" href="#">Click <span>Derecho</span></a>
    <div class="card">
      <span class="eyebrow">Video gratuito</span>
      <h1>Duplicá tus clientes<br><em>en 90 días.</em></h1>
      <p class="sub">Ingresá tu email y accedé ahora al video donde mostramos exactamente cómo lo hacemos.</p>

      <div id="form-container">
        <div class="form-group">
          <label>Tu email</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <button class="btn" id="btn-submit">Ver el video gratis →</button>
        <p class="disclaimer">Sin spam. Solo contenido de valor.</p>
      </div>

      <div class="success" id="success">
        <div class="check">✅</div>
        <h3>¡Listo! Redirigiendo...</h3>
        <p>Te estamos llevando al video.</p>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR_gq0-jDnV0YwEddxB9zAjALshjk3bIHfA8CExtWFB4t8H9mMEbMVO61RXDLaLpIGig/exec';
    const WEBINAR_URL = 'https://web-click-derecho.vercel.app';

    document.getElementById('btn-submit').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        alert('Por favor ingresá tu email.');
        return;
      }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre: '', email, whatsapp: '' })
        });
      } catch (e) {}

      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success').style.display = 'block';

      setTimeout(() => {
        window.location.href = WEBINAR_URL;
      }, 1500);
    });

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-submit').click();
    });
  </script>
</body>
</html>
