  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0e0c;
      --paper:   #f5f2ec;
      --gold:    #b8972a;
      --gold-lt: #d4b44a;
      --muted:   #6b6455;
      --line:    rgba(184,151,42,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--paper);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 5%;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(184,151,42,.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,151,42,.05) 0%, transparent 70%);
      pointer-events: none;

height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      letter-spacing: .04em; color: var(--paper);
      text-decoration: none; display: block;
      text-align: center; margin-bottom: 2.5rem;
    }
    .logo span { color: var(--gold); }

    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(184,151,42,.2);
      border-radius: 6px;
      padding: 3rem 2.5rem;
      max-width: 480px; width: 100%;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 6px 6px 0 0;
    }

    .eyebrow {
      display: inline-block;
      font-size: .65rem; font-weight: 500; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold);
      border: 1px solid rgba(184,151,42,.3); border-radius: 2px;
      padding: .3rem .8rem; margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.1; font-weight: 700;
      margin-bottom: .75rem;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .sub {
      font-size: .9rem; color: rgba(245,242,236,.55);
      line-height: 1.6; margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: .75rem;
      letter-spacing: .08em; text-transform: uppercase;
      color: rgba(245,242,236,.5); margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%; padding: .85rem 1rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(184,151,42,.2);
      border-radius: 3px; color: var(--paper);
      font-family: 'DM Sans', sans-serif; font-size: .95rem;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input::placeholder { color: rgba(245,242,236,.25); }
    .form-group input:focus { border-color: var(--gold); }

    .btn {
      display: block; width: 100%;
      background: var(--gold); color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; text-decoration: none;
      padding: 1rem; border-radius: 3px; border: none;
      cursor: pointer; margin-top: 1.5rem;
      transition: background .25s, transform .2s;
    }
    .btn:hover { background: var(--gold-lt); transform: translateY(-2px); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .disclaimer {
      text-align: center; margin-top: 1rem;
      font-size: .72rem; color: rgba(245,242,236,.3);
    }

    .success {
      display: none; text-align: center; padding: 1rem 0;
    }
    .success .check { font-size: 2.5rem; margin-bottom: 1rem; }
    .success h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; color: var(--gold-lt);
      margin-bottom: .5rem;
    }
    .success p { font-size: .9rem; color: rgba(245,242,236,.55); }
  </style>
</head>
<body>

  <div style="width:100%;max-width:480px;">
    <a class="logo" href="#">Click <span>Derecho</span></a>

    <div class="card">
      <span class="eyebrow">Webinar gratuito</span>
      <h1>Duplicá tus clientes<br><em>en 90 días.</em></h1>
      <p class="sub">Dejá tus datos y accedé ahora al webinar donde mostramos exactamente cómo lo hacemos.</p>

      <div id="form-container">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="+54 9 11 1234 5678" required />
        </div>

        <button class="btn" id="btn-submit">Acceder al webinar →</button>
        <p class="disclaimer">Tu información es privada. No enviamos spam.</p>
      </div>

      <div class="success" id="success">
        <div class="check">✅</div>
        <h3>¡Listo! Redirigiendo...</h3>
        <p>Te estamos llevando al webinar.</p>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR_gq0-jDnV0YwEddxB9zAjALshjk3bIHfA8CExtWFB4t8H9mMEbMVO61RXDLaLpIGig/exec';
    const WEBINAR_URL = 'https://web-click-derecho.vercel.app'; // <-- cambiá por tu URL real de Vercel

    document.getElementById('btn-submit').addEventListener('click', async () => {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const whatsapp = document.getElementById('whatsapp').value.trim();

      if (!nombre || !email || !whatsapp) {
        alert('Por favor completá todos los campos.');
        return;
      }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, whatsapp })
        });
      } catch (e) {}

      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success').style.display = 'block';

      setTimeout(() => {
        window.location.href = WEBINAR_URL;
      }, 2000);
    });
  </script>

</body>
</html>
